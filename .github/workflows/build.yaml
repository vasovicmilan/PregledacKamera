name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd src
          pip install PySide6 Pillow pyinstaller
      - name: Build with PyInstaller
        run: |
          cd src
          pyinstaller PregledacKamera.spec
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-Windows
          path: src/dist/PregledacKamera.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd src
          pip install PySide6 Pillow pyinstaller
      - name: Build with PyInstaller
        run: |
          cd src
          pyinstaller PregledacKamera.spec
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-Linux
          path: src/dist/PregledacKamera

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd src
          pip install PySide6 Pillow pyinstaller
      - name: Build with PyInstaller
        run: |
          cd src
          pyinstaller PregledacKamera.spec
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraApp-macOS
          path: src/dist/PregledacKamera
